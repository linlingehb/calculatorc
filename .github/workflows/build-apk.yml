name: Build Kivy APK with Buildozer

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git zip unzip openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses-dev libffi-dev libssl-dev \
            libsqlite3-dev libbz2-dev libreadline-dev liblzma-dev cmake \
            libltdl-dev

      - name: Cache Buildozer (SDK/NDK/venv)
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            .venv
          key: ${{ runner.os }}-buildozer-v4-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v4-

      - name: Create venv and install Buildozer/Cython
        run: |
          if [ ! -d .venv ]; then
            python -m venv .venv
          fi
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Setup Android SDK platform (trigger SDK download)
        run: |
          source .venv/bin/activate
          # First run: let buildozer download SDK/NDK (will fail, that's expected)
          buildozer -v android debug 2>&1 | tee /tmp/first_build.log || true

      - name: Install Android API 33 platform
        if: success() || failure()
        run: |
          SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          echo "SDK root: $SDK_ROOT"
          ls -la "$SDK_ROOT/"
          
          # Extract cmdline-tools zip if present (buildozer may leave it zipped)
          ZIP_FILE="$SDK_ROOT/commandlinetools-linux-6514223_latest.zip"
          if [ -f "$ZIP_FILE" ]; then
            echo "Extracting commandline tools..."
            unzip -qo "$ZIP_FILE" -d "$SDK_ROOT/tmp_cmdline"
            mkdir -p "$SDK_ROOT/cmdline-tools"
            mv "$SDK_ROOT/tmp_cmdline/cmdline-tools"/* "$SDK_ROOT/cmdline-tools/" 2>/dev/null || \
              mv "$SDK_ROOT/tmp_cmdline"/* "$SDK_ROOT/cmdline-tools/latest/" 2>/dev/null
            rm -rf "$SDK_ROOT/tmp_cmdline"
          fi
          
          # Find sdkmanager (check both cmdline-tools and tools paths)
          SDKMGR=$(find "$SDK_ROOT" -name sdkmanager -type f 2>/dev/null | head -1)
          if [ -z "$SDKMGR" ]; then
            echo "ERROR: sdkmanager not found!"
            find "$SDK_ROOT" -maxdepth 3 -type d 2>/dev/null
            exit 1
          fi
          echo "sdkmanager: $SDKMGR"
          
          # Accept licenses
          yes | "$SDKMGR" --sdk_root="$SDK_ROOT" --licenses 2>/dev/null || true
          
          # Install API 33
          echo "Installing platforms;android-33..."
          "$SDKMGR" --sdk_root="$SDK_ROOT" "platforms;android-33" "build-tools;33.0.0" < /dev/null
          
          # Verify
          echo "Installed platforms:"
          find "$SDK_ROOT/platforms" -maxdepth 1 -type d 2>/dev/null || echo "  (none found)"

      - name: Build Debug APK
        run: |
          source .venv/bin/activate
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sci-calculator-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: List generated APK
        run: ls -lh bin/*.apk
