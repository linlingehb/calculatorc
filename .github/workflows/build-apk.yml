name: Build Kivy APK with Buildozer

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git zip unzip openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses-dev libffi-dev libssl-dev \
            libsqlite3-dev libbz2-dev libreadline-dev liblzma-dev cmake \
            libltdl-dev

      - name: Cache Buildozer (SDK/NDK/venv)
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            .venv
          key: ${{ runner.os }}-buildozer-v4-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v4-

      - name: Create venv and install Buildozer/Cython
        run: |
          if [ ! -d .venv ]; then
            python -m venv .venv
          fi
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Build Debug APK
        run: |
          source .venv/bin/activate
          buildozer -v android debug 2>&1 | tee /tmp/build.log
          exit_code=${PIPESTATUS[0]}
          if [ $exit_code -ne 0 ] && grep -q "Requested API target.*is not available" /tmp/build.log; then
            echo "::group::Installing missing Android SDK platform"
            SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
            TOOLS_BIN=$(find "$SDK_ROOT/cmdline-tools" -name sdkmanager -type f 2>/dev/null | head -1)
            yes | "$TOOLS_BIN" --sdk_root="$SDK_ROOT" "platforms;android-33" || true
            echo "::endgroup::"
            echo "Retrying buildozer..."
            buildozer -v android debug
          elif [ $exit_code -ne 0 ]; then
            exit $exit_code
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sci-calculator-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: List generated APK
        run: ls -lh bin/*.apk
