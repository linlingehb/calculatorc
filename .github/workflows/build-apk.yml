name: Build Kivy APK with Buildozer

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git zip unzip openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses-dev libffi-dev libssl-dev \
            libsqlite3-dev libbz2-dev libreadline-dev liblzma-dev cmake \
            libltdl-dev

      - name: Cache Buildozer (SDK/NDK/venv)
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            .venv
          key: ${{ runner.os }}-buildozer-v4-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v4-

      - name: Create venv and install Buildozer/Cython
        run: |
          if [ ! -d .venv ]; then
            python -m venv .venv
          fi
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Setup Android SDK platform (trigger SDK download)
        run: |
          source .venv/bin/activate
          # First run: let buildozer download SDK/NDK (will fail, that's expected)
          buildozer -v android debug 2>&1 | tee /tmp/first_build.log || true

      - name: Install Android API 33 platform
        if: success() || failure()
        run: |
          SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          echo "SDK root: $SDK_ROOT"
          
          # Find sdkmanager binary
          SDKMGR=$(find "$SDK_ROOT/cmdline-tools" -name sdkmanager -type f 2>/dev/null | head -1)
          if [ -z "$SDKMGR" ]; then
            echo "ERROR: sdkmanager not found!"
            ls -la "$SDK_ROOT"/ 2>/dev/null
            exit 1
          fi
          echo "sdkmanager: $SDKMGR"
          
          # Accept SDK licenses
          yes | "$SDKMGR" --sdk_root="$SDK_ROOT" --licenses > /dev/null 2>&1
          
          # Install API 33 platform and build tools
          echo "Installing platforms;android-33..."
          "$SDKMGR" --sdk_root="$SDK_ROOT" "platforms;android-33" "build-tools;33.0.0" --verbose < /dev/null
          
          # Verify
          echo "Installed platforms:"
          find "$SDK_ROOT/platforms" -maxdepth 1 -type d 2>/dev/null || echo "  (none found)"

      - name: Build Debug APK
        run: |
          source .venv/bin/activate
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sci-calculator-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: List generated APK
        run: ls -lh bin/*.apk
